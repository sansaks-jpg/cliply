name: Build Desktop App
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js + pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend deps
        run: pnpm install
        working-directory: frontend

      - name: Build Next.js
        run: pnpm build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8003

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements-bundle.txt
            backend/requirements-local.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-bundle.txt -r requirements-local.txt
        working-directory: backend

      - name: Download face detection models
        shell: pwsh
        working-directory: backend
        run: |
          New-Item -ItemType Directory -Force -Path models
          $models = @{
            "face_detection_yunet_2023mar.onnx" = "https://github.com/opencv/opencv_3rdparty/raw/face_detection_yunet_2023mar/face_detection_yunet_2023mar.onnx"
            "blaze_face_short_range.tflite" = "https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/latest/blaze_face_short_range.tflite"
            "yolov8n-face.onnx" = "https://github.com/derronqi/yolov8-face/raw/main/yolov8n-face.onnx"
            "deploy.prototxt" = "https://raw.githubusercontent.com/opencv/opencv/master/samples/dnn/face_detector/deploy.prototxt"
            "res10_300x300_ssd_iter_140000.caffemodel" = "https://raw.githubusercontent.com/opencv/opencv_3rdparty/dnn_samples_face_detector_20170830/res10_300x300_ssd_iter_140000.caffemodel"
          }
          foreach ($entry in $models.GetEnumerator()) {
            $outPath = "models/$($entry.Key)"
            if (-not (Test-Path $outPath)) {
              Write-Host "Downloading $($entry.Key)..."
              Invoke-WebRequest -Uri $entry.Value -OutFile $outPath -UseBasicParsing
            }
          }
          Write-Host "All models downloaded."

      - name: Build Python backend executable
        run: pyinstaller cliply.spec --noconfirm
        working-directory: backend

      - name: Debug PyInstaller output
        shell: pwsh
        working-directory: backend
        run: |
          Write-Host "Current directory:"
          Get-Location
          Write-Host "`nDist contents:"
          Get-ChildItem dist -Recurse
          Write-Host "`nBuild contents:"
          Get-ChildItem build -Recurse

      - name: Verify backend executable
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse -Filter cliply_server.exe | Select-Object -First 1
          if (-not $exe) {
            throw "cliply_server.exe not found after PyInstaller build"
          }
          Write-Host "Backend executable: $($exe.FullName)"

          $proc = Start-Process -FilePath $exe.FullName -NoNewWindow -PassThru
          $timeout = 20
          $ok = $false
          for ($i = 0; $i -lt $timeout; $i++) {
            Start-Sleep -Seconds 1
            try {
              $health = Invoke-WebRequest -Uri "http://127.0.0.1:8003/health" -UseBasicParsing
              if ($health.StatusCode -eq 200) {
                $encoders = Invoke-WebRequest -Uri "http://127.0.0.1:8003/encoders" -UseBasicParsing
                if ($encoders.StatusCode -eq 200) {
                  $ok = $true; break
                }
              }
            } catch {}
          }
          if (!$proc.HasExited) {
            $proc.Kill()
            $proc.WaitForExit()
          }
          if (-not $ok) { throw "Backend smoke test FAILED" }
          Write-Host "Backend smoke test PASSED"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build Tauri app
        run: pnpm tauri build
        working-directory: frontend

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: frontend/src-tauri/target/release/bundle/msi/*.msi
          generate_release_notes: true
