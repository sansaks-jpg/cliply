name: Build Desktop App
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js + pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend deps
        run: pnpm install
        working-directory: frontend

      - name: Build Next.js
        run: pnpm build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-bundle.txt -r requirements-local.txt
        working-directory: backend

      - name: Build Python backend executable
        run: pyinstaller cliply.spec --noconfirm
        working-directory: backend

      - name: Verify backend executable
        shell: pwsh
        run: |
          $proc = Start-Process -FilePath "dist\cliply_server.exe" -NoNewWindow -PassThru
          $timeout = 20
          $ok = $false
          for ($i = 0; $i -lt $timeout; $i++) {
            Start-Sleep -Seconds 1
            try {
              $health = Invoke-WebRequest -Uri "http://127.0.0.1:8000/health" -UseBasicParsing
              if ($health.StatusCode -eq 200) {
                $encoders = Invoke-WebRequest -Uri "http://127.0.0.1:8000/encoders" -UseBasicParsing
                if ($encoders.StatusCode -eq 200) {
                  $ok = $true; break
                }
              }
            } catch {}
          }
          $proc.Kill()
          $proc.WaitForExit()
          if (-not $ok) { throw "Backend smoke test FAILED: /health or /encoders not responding" }
          Write-Host "Backend smoke test PASSED"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build Tauri app
        run: pnpm tauri build
        working-directory: frontend

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cliply-windows-${{ github.ref_name }}
          path: frontend/src-tauri/target/release/bundle/msi/*.msi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: frontend/src-tauri/target/release/bundle/msi/*.msi
          generate_release_notes: true
