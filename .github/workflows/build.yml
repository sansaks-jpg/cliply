name: Build Desktop App
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js + pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend deps
        run: pnpm install
        working-directory: frontend

      - name: Build Next.js
        run: pnpm build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8003

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements-bundle.txt
            backend/requirements-local.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-bundle.txt -r requirements-local.txt
        working-directory: backend

      - name: Build Python backend executable
        run: pyinstaller cliply.spec --noconfirm
        working-directory: backend

      - name: Debug PyInstaller output
        shell: pwsh
        working-directory: backend
        run: |
          Write-Host "Current directory:"
          Get-Location
          Write-Host "`nDist contents:"
          Get-ChildItem dist -Recurse
          Write-Host "`nBuild contents:"
          Get-ChildItem build -Recurse

      - name: Verify backend executable
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Recurse -Filter cliply_server.exe | Select-Object -First 1
          if (-not $exe) {
            throw "cliply_server.exe not found after PyInstaller build"
          }
          Write-Host "Backend executable: $($exe.FullName)"

          $proc = Start-Process -FilePath $exe.FullName -NoNewWindow -PassThru
          $timeout = 30
          $ok = $false
          for ($i = 0; $i -lt $timeout; $i++) {
            Start-Sleep -Seconds 1
            try {
              $health = Invoke-WebRequest -Uri "http://127.0.0.1:8003/health" -UseBasicParsing
              if ($health.StatusCode -eq 200) {
                $encoders = Invoke-WebRequest -Uri "http://127.0.0.1:8003/encoders" -UseBasicParsing
                if ($encoders.StatusCode -eq 200) {
                  $ok = $true; break
                }
              }
            } catch {}
          }
          if (-not $ok) {
            if (!$proc.HasExited) { $proc.Kill(); $proc.WaitForExit() }
            throw "Backend smoke test FAILED (health/encoders)"
          }
          Write-Host "Backend health check PASSED"

          # Smoke test: POST /tasks harus return 201 dan task_id valid
          $body = @{
            url = "https://www.youtube.com/watch?v=dQw4w9WgXcQ"
            num_clips = 1
            aspect_ratio = "9:16"
            subtitle_style = "viral-bold"
          } | ConvertTo-Json
          try {
            $taskResp = Invoke-WebRequest -Uri "http://127.0.0.1:8003/tasks" -Method POST `
              -Body $body -ContentType "application/json" -UseBasicParsing
            if ($taskResp.StatusCode -ne 201) {
              throw "POST /tasks returned $($taskResp.StatusCode), expected 201"
            }
            $taskData = $taskResp.Content | ConvertFrom-Json
            $taskId = $taskData.task_id
            if (-not $taskId) { throw "task_id missing from POST /tasks response" }
            Write-Host "POST /tasks OK, task_id=$taskId"

            # Verify GET /tasks/{id} returns 200 (not 404)
            Start-Sleep -Seconds 2
            $getResp = Invoke-WebRequest -Uri "http://127.0.0.1:8003/tasks/$taskId" -UseBasicParsing -ErrorAction Stop
            if ($getResp.StatusCode -ne 200) {
              throw "GET /tasks/$taskId returned $($getResp.StatusCode), expected 200 (task creation bug!)"
            }
            Write-Host "GET /tasks/$taskId OK - task creation smoke test PASSED"
          } catch {
            if (!$proc.HasExited) { $proc.Kill(); $proc.WaitForExit() }
            throw "Task creation smoke test FAILED: $_"
          }

          if (!$proc.HasExited) {
            $proc.Kill()
            $proc.WaitForExit()
          }
          Write-Host "All backend smoke tests PASSED"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build Tauri app
        run: pnpm tauri build
        working-directory: frontend

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: frontend/src-tauri/target/release/bundle/msi/*.msi
          generate_release_notes: true
