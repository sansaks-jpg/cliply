name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # ── Python backend (PyInstaller) ──────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          pip install -r backend/requirements-bundle.txt
        working-directory: .

      - name: Build backend exe
        run: |
          cd backend
          pyinstaller cliply.spec --distpath dist --noconfirm
        working-directory: .

      - name: Verify backend exe exists
        run: |
          if (-not (Test-Path "backend/dist/cliply_server.exe")) { exit 1 }
          Write-Host "backend/dist/cliply_server.exe built OK"
        shell: pwsh

      # ── Frontend (Next.js) ────────────────────────────────────────
      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      # ── Tauri desktop app ─────────────────────────────────────────
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: frontend
          tagName: ${{ github.ref_name }}
          releaseName: "Cliply ${{ github.ref_name }}"
          releaseBody: |
            ## Cliply ${{ github.ref_name }}

            ### Changes
            - Fix: Tauri empty env vars no longer override `.env` API keys
            - Fix: Transcription error messages now show per-provider failure reasons
            - Fix: YouTube transcript exceptions logged at DEBUG level

            ### Install
            Download the `.msi` installer below. The app auto-updates from this release.
          releaseDraft: true
          prerelease: false
